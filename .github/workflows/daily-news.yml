name: Daily News

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00（主）
    - cron: '0 2 * * *'   # UTC 02:00 = 北京时间 10:00（备用）
  workflow_dispatch:       # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check if already published today
        id: check_duplicate
        run: |
          TODAY=$(date -u -d '+8 hours' +%Y-%m-%d)
          if [ -f "source/_posts/daily-news-${TODAY}.md" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "📌 Today's post already exists, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🚀 No post for today, proceeding"
          fi

      - name: Setup Node.js
        if: steps.check_duplicate.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.check_duplicate.outputs.skip != 'true'
        run: npm ci

      - name: Fetch daily news
        if: steps.check_duplicate.outputs.skip != 'true'
        run: node tools/fetch-news.js

      - name: Check for new posts
        if: steps.check_duplicate.outputs.skip != 'true'
        id: changes
        run: |
          git add source/_posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 No new posts generated"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📬 New posts detected"
          fi

      - name: Commit and push
        if: steps.check_duplicate.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "📰 每日热点: $(date +%Y-%m-%d)"
          git push
